<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Detailed Card Path Animation</title>
<style>
    :root {
        --bg-color: #000000;
        --ui-bg: rgba(20, 20, 20, 0.85);
        --ui-border: rgba(255, 255, 255, 0.1);
        --text-color: #888;
        --text-active: #000;
        --btn-bg: #222;
        --btn-active: #fff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
    }

    body {
        background-color: var(--bg-color);
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        height: 100vh;
        width: 100vw;
    }

    #scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        perspective: 1000px;
    }

    /* Ultra-Detailed Card Styling */
    .card {
        position: absolute;
        top: 0;
        left: 0;
        width: 90px;
        height: 130px;
        border-radius: 12px;
        background: #111;
        box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.1);
        transform-origin: center center;
        will-change: transform;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: filter 0.3s;
    }

    /* Card Variants mimicking the video */
    .card.c-thermal {
        background: radial-gradient(circle at 70% 30%, #ffeb3b 0%, #ff5722 40%, #9c27b0 70%, #111 100%);
        border: 1px solid #ff9800;
    }
    
    .card.c-white {
        background: #f4f4f4;
        box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 0 2px #ddd;
    }
    .card.c-white::after {
        content: '+';
        font-size: 50px;
        color: #aaa;
        font-weight: 900;
    }

    .card.c-pink {
        background: #f48fb1;
        border: 1px solid #f06292;
    }
    .card.c-pink::after {
        content: '';
        width: 35px;
        height: 35px;
        background: #c2185b;
        mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>') center/cover;
        -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>') center/cover;
    }

    .card.c-dark {
        background: #1a1a1a;
        border: 2px solid #333;
    }
    .card.c-dark::before {
        content: '';
        position: absolute;
        inset: 12px;
        border: 2px dashed #444;
        border-radius: 8px;
    }
    .card.c-dark::after {
        content: '';
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: radial-gradient(circle, #444 20%, transparent 80%);
    }

    .card.c-red {
        background: linear-gradient(135deg, #b71c1c, #7f0000);
        border: 1px solid #ff5252;
    }
    .card.c-red::after {
        content: '';
        width: 50px;
        height: 50px;
        border-radius: 10px;
        background: rgba(0,0,0,0.3);
        transform: rotate(45deg);
    }

    /* Control Panel UI */
    .controls-wrapper {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ui-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--ui-border);
        padding: 12px 16px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 32px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        z-index: 1000;
    }

    .btn-group {
        display: flex;
        gap: 6px;
        background: #000;
        padding: 4px;
        border-radius: 14px;
    }

    .btn {
        background: transparent;
        color: var(--text-color);
        border: none;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn:hover { color: #fff; }
    .btn.active {
        background: var(--btn-active);
        color: var(--text-active);
    }

    .control-group {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--text-color);
    }

    .val-display { color: #fff; font-size: 13px; width: 12px; text-align: center; }

    input[type=range] {
        -webkit-appearance: none;
        width: 100px;
        background: transparent;
    }
    input[type=range]::-webkit-slider-runnable-track {
        height: 4px;
        background: #333;
        border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: #fff;
        margin-top: -6px;
        cursor: pointer;
    }

    .stepper {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #000;
        padding: 4px;
        border-radius: 12px;
    }

    .step-btn {
        background: #222;
        color: #fff;
        border: none;
        width: 26px;
        height: 26px;
        border-radius: 8px;
        font-size: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.1s;
    }
    .step-btn:hover { background: #333; }
    .step-btn:active { transform: scale(0.95); }

</style>
</head>
<body>

<div id="scene"></div>

<div class="controls-wrapper">
    <div class="btn-group">
        <button class="btn" data-path="Loop">Loop</button>
        <button class="btn" data-path="Wave">Wave</button>
        <button class="btn active" data-path="Curly">Curly</button>
        <button class="btn" data-path="Stripes">Stripes</button>
    </div>

    <div class="control-group">
        <span>SPEED</span>
        <input type="range" id="speed-slider" min="1" max="10" value="5">
        <span class="val-display" id="speed-val">5</span>
    </div>

    <div class="control-group">
        <span>REPEAT</span>
        <div class="stepper">
            <button class="step-btn" id="rep-minus">−</button>
            <span class="val-display" id="rep-val" style="width:16px;">4</span>
            <button class="step-btn" id="rep-plus">+</button>
        </div>
    </div>
</div>

<script>
    const scene = document.getElementById('scene');
    const numCards = 140; 
    const cards = [];
    
    // State
    let currentPath = 'Curly';
    let speed = 5;
    let repeat = 4;
    let time = 0;

    // UI Elements
    const buttons = document.querySelectorAll('.btn-group .btn');
    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');
    const repMinus = document.getElementById('rep-minus');
    const repPlus = document.getElementById('rep-plus');
    const repVal = document.getElementById('rep-val');

    // Card styling presets
    const styles = ['c-thermal', 'c-white', 'c-pink', 'c-dark', 'c-red'];

    // Initialize Cards
    for (let i = 0; i < numCards; i++) {
        const card = document.createElement('div');
        card.className = `card ${styles[i % styles.length]}`;
        scene.appendChild(card);
        cards.push(card);
    }

    // Path Mathematics
    function getPathCoordinates(type, t, index, repeatCount) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        // Normalize t to [0, 1] bounds strictly for math looping
        t = ((t % 1.0) + 1.0) % 1.0;

        let x = 0, y = 0;

        if (type === 'Wave') {
            const spread = w + 1000;
            const cx = -500 + t * spread;
            const angle = t * Math.PI * 2 * repeatCount;
            x = cx;
            y = h / 2 + Math.sin(angle) * 250;
        } 
        else if (type === 'Curly') {
            const spread = w + 1200;
            const cx = -600 + t * spread;
            const angle = t * Math.PI * 2 * repeatCount;
            const radius = 160;
            x = cx - radius * Math.sin(angle);
            y = h / 2 - radius * Math.cos(angle);
        } 
        else if (type === 'Loop') {
            // Lemniscate / Infinity curve
            const angle = t * Math.PI * 2;
            const scale = Math.min(w, h) * 0.4;
            
            // Repeat distributes cards across multiple parallel/offset tracks
            const trackOffset = ((index % repeatCount) - (repeatCount - 1) / 2) * 40;
            const s = scale + trackOffset;

            const den = 1 + Math.sin(angle) * Math.sin(angle);
            x = w / 2 + (s * Math.cos(angle)) / den;
            y = h / 2 + (s * Math.sin(angle) * Math.cos(angle)) / den;
        } 
        else if (type === 'Stripes') {
            // Multiple diagonal lines
            const stripeIndex = index % repeatCount;
            const offset = (stripeIndex - (repeatCount - 1) / 2) * 220;
            const spreadX = w + 1400;
            const spreadY = h + 1400;
            
            x = -700 + t * spreadX + offset;
            y = h + 700 - t * spreadY + offset;
        }

        return { x, y };
    }

    // Animation Loop
    function render() {
        // Time increment based on speed
        time += (speed * 0.0003);

        cards.forEach((card, i) => {
            let base_t;
            
            // Grouping distribution based on path type
            if (currentPath === 'Stripes') {
                const cardsPerStripe = numCards / repeat;
                base_t = Math.floor(i / repeat) / cardsPerStripe;
            } else {
                base_t = i / numCards;
            }

            const t = time + base_t;

            // Numerical differentiation for rotation
            const dt = 0.001;
            const p1 = getPathCoordinates(currentPath, t, i, repeat);
            const p2 = getPathCoordinates(currentPath, t + dt, i, repeat);
            
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const angle = Math.atan2(dy, dx);

            // Translate (-50%, -50%) centers the physical card on the mathematical point
            card.style.transform = `translate(${p1.x}px, ${p1.y}px) translate(-50%, -50%) rotate(${angle}rad)`;
        });

        requestAnimationFrame(render);
    }

    // Event Listeners
    buttons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            buttons.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentPath = e.target.dataset.path;
        });
    });

    speedSlider.addEventListener('input', (e) => {
        speed = parseInt(e.target.value);
        speedVal.textContent = speed;
    });

    repMinus.addEventListener('click', () => {
        if (repeat > 1) {
            repeat--;
            repVal.textContent = repeat;
        }
    });

    repPlus.addEventListener('click', () => {
        if (repeat < 10) {
            repeat++;
            repVal.textContent = repeat;
        }
    });

    // Start
    requestAnimationFrame(render);

</script>
</body>
</html>
