<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Grainy Shape Editor 🚀</title>
    <style>
        :root {
            --bg: #0a0b10;
            --panel: #161722;
            --accent: #ff007f;
            --text: #ffffff;
            --text-muted: #8a8d9b;
            --border: #2a2b38;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Soft UI Sidebar */
        .sidebar {
            width: 350px;
            background-color: var(--panel);
            border-right: 1px solid var(--border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff007f, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        /* Clean Inputs */
        select,
        input[type="range"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent);
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            padding: 0;
            height: 6px;
            background: var(--border);
            border: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--text);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Color Pickers Flex */
        .color-row {
            display: flex;
            gap: 10px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border);
            border-radius: 8px;
        }

        /* Button */
        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
        }

        /* Preview Area */
        .preview-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            position: relative;
        }

        canvas {
            background: #121218;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 500px;
            height: 500px;
        }

        .canvas-wrapper {
            position: relative;
            padding: 20px;
            background: var(--panel);
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h1>Shape Editor</h1>

        <div class="control-group">
            <label>Form <span id="val-shape"></span></label>
            <select id="shape">
                <option value="star4">4-Point Sparkle (Stern)</option>
                <option value="star5">5-Point Star</option>
                <option value="star8">8-Point Burst</option>
                <option value="circle">Kreis</option>
                <option value="square">Abgerundetes Quadrat</option>
                <option value="flower">Blume / Blob</option>
                <option value="hexagon">Hexagon</option>
                <option value="diamond">Raute / Diamant</option>
            </select>
        </div>

        <div class="control-group">
            <label>Größe <span id="val-size">200</span></label>
            <input type="range" id="size" min="50" max="250" value="180">

            <label>Rotation <span id="val-rotation">0°</span></label>
            <input type="range" id="rotation" min="0" max="360" value="0">

            <label>Spezial-Parameter (Spitzen/Rundung) <span id="val-spoke">50%</span></label>
            <input type="range" id="spoke" min="10" max="100" value="35">
        </div>

        <div class="control-group">
            <label>Verlauf Farben (Gradient)</label>
            <div class="color-row">
                <input type="color" id="color1" value="#00f2fe">
                <input type="color" id="color2" value="#4facfe">
                <input type="color" id="color3" value="#f093fb">
                <input type="color" id="color4" value="#f5576c">
            </div>

            <label>Verlauf Winkel <span id="val-angle">45°</span></label>
            <input type="range" id="angle" min="0" max="360" value="45">
        </div>

        <div class="control-group">
            <label>Grain / Rauschen <span id="val-noise">40%</span></label>
            <input type="range" id="noise" min="0" max="100" value="45">

            <label>Noise Kontrast <span id="val-contrast">50%</span></label>
            <input type="range" id="contrast" min="0" max="100" value="70">
        </div>

        <button id="download">PNG Herunterladen 🚀</button>
    </div>

    <div class="preview-container">
        <div class="canvas-wrapper">
            <canvas id="canvas" width="1000" height="1000"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;

        // Noise Canvas (Pre-rendered for performance)
        const noiseCanvas = document.createElement('canvas');
        noiseCanvas.width = width;
        noiseCanvas.height = height;
        const noiseCtx = noiseCanvas.getContext('2d');

        // Inputs holen
        const inputs = ['shape', 'size', 'rotation', 'spoke', 'color1', 'color2', 'color3', 'color4', 'angle', 'noise', 'contrast'];
        const state = {};

        inputs.forEach(id => {
            const el = document.getElementById(id);
            state[id] = el.value;
            el.addEventListener('input', (e) => {
                state[id] = e.target.value;
                const labelVal = document.getElementById(`val-${id}`);
                if (labelVal) {
                    if (id === 'rotation' || id === 'angle') labelVal.innerText = state[id] + '°';
                    else if (['spoke', 'noise', 'contrast'].includes(id)) labelVal.innerText = state[id] + '%';
                    else labelVal.innerText = state[id];
                }
                if (id === 'contrast') generateNoise(); // Regenerate noise if contrast changes
                draw();
            });
        });

        // Generiert statisches Rauschen
        function generateNoise() {
            const contrast = parseInt(state.contrast) / 100;
            const imgData = noiseCtx.createImageData(width, height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                // S/W Noise
                const val = (Math.random() - 0.5) * 255 * (contrast * 2) + 128;
                data[i] = val; // R
                data[i + 1] = val; // G
                data[i + 2] = val; // B
                data[i + 3] = 255; // Alpha
            }
            noiseCtx.putImageData(imgData, 0, 0);
        }

        // Hilfsfunktion: Sterne zeichnen
        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        // Hilfsfunktion: Blume/Blob zeichnen
        function drawFlower(ctx, cx, cy, radius, petals, bulge) {
            ctx.beginPath();
            for (let a = 0; a < Math.PI * 2; a += 0.01) {
                const r = radius + Math.sin(a * petals) * bulge;
                const x = cx + Math.cos(a) * r;
                const y = cy + Math.sin(a) * r;
                if (a === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
        }

        // Hilfsfunktion: Polygon zeichnen
        function drawPolygon(ctx, cx, cy, sides, radius) {
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI / sides) - (Math.PI / 2);
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
        }

        function draw() {
            // Skalierung für High-Res Canvas anpassen (Faktor 2, da wir 1000x1000 haben, aber UI bis 250 geht)
            const size = parseInt(state.size) * 2;
            const rot = parseInt(state.rotation) * (Math.PI / 180);
            const spoke = parseInt(state.spoke) / 100;
            const angle = parseInt(state.angle) * (Math.PI / 180);
            const noiseAlpha = parseInt(state.noise) / 100;

            // 1. Clear Canvas (wir nutzen transparent, damit man es perfekt als PNG mit transparentem BG speichern kann)
            ctx.clearRect(0, 0, width, height);

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rot);

            // 2. Pfad erstellen basierend auf Form
            switch (state.shape) {
                case 'star4':
                    // Typisches "Sparkle" Icon
                    drawStar(ctx, 0, 0, 4, size, size * spoke * 0.5);
                    break;
                case 'star5':
                    drawStar(ctx, 0, 0, 5, size, size * spoke);
                    break;
                case 'star8':
                    drawStar(ctx, 0, 0, 8, size, size * spoke);
                    break;
                case 'circle':
                    ctx.beginPath();
                    ctx.arc(0, 0, size, 0, Math.PI * 2);
                    break;
                case 'square':
                    ctx.beginPath();
                    // Abrundung basierend auf Spoke-Parameter
                    const radius = size * spoke;
                    ctx.roundRect(-size, -size, size * 2, size * 2, radius);
                    break;
                case 'flower':
                    drawFlower(ctx, 0, 0, size, 8, size * spoke);
                    break;
                case 'hexagon':
                    drawPolygon(ctx, 0, 0, 6, size);
                    break;
                case 'diamond':
                    drawPolygon(ctx, 0, 0, 4, size);
                    break;
            }

            // 3. Clip anwenden (Damit Rauschen und Farbe nur in der Form bleiben)
            ctx.clip();

            // 4. Gradient zeichnen
            // Um den Winkel des Gradients zu berechnen
            const x1 = -Math.cos(angle) * size;
            const y1 = -Math.sin(angle) * size;
            const x2 = Math.cos(angle) * size;
            const y2 = Math.sin(angle) * size;

            const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
            gradient.addColorStop(0, state.color1);
            gradient.addColorStop(0.33, state.color2);
            gradient.addColorStop(0.66, state.color3);
            gradient.addColorStop(1, state.color4);

            ctx.fillStyle = gradient;
            ctx.fill();

            // 5. Rauschen (Grain) darüberlegen
            if (noiseAlpha > 0) {
                // Overlay Blend Mode ist der Schlüssel für den coolen Effekt!
                ctx.globalCompositeOperation = 'overlay';
                ctx.globalAlpha = noiseAlpha;
                // Da wir im Center translatet haben, müssen wir das Rauschen verschieben
                ctx.drawImage(noiseCanvas, -centerX, -centerY);
            }

            ctx.restore();
        }

        // Download Funktion
        document.getElementById('download').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `soft-ui-icon-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Initialsierung
        generateNoise();
        draw();
    </script>
</body>

</html>
